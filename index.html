<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الأرباح - Kingo</title>
    <!-- استدعاء مكتبة تلجرام الرسمية -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- 1. الصق كود الـ SDK اللي نسخته هنا بالأسفل (امسح السطر اللي تحت وحط الكود بتاعك) -->
   <script src='//libtl.com/sdk.js' data-zone='11326679' data-sdk='show_11326679'></script>
    <style>
        body {
            background-color: #0e1621;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .btn {
            background-color: #31b545;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(49, 181, 69, 0.4);
            margin-top: 50px;
            width: 80%;
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h2>اضغط لمشاهدة الإعلان وتجميع الأرباح 🤑</h2>
    <p>بمجرد الضغط، سيفتح لك الإعلان. بعد الانتهاء من مشاهدته، سيتم إضافة 1 جنيه لرصيدك تلقائياً!</p>

    <!-- زرار الإعلان -->
    <button class="btn" id="adBtn">🎬 كسب 1 جنيه</button>

    <script>
        // تهيئة تطبيق التلجرام المصغر
        const tg = window.Telegram.WebApp;
        tg.expand(); // لفتح التطبيق بملء الشاشة

        const adButton = document.getElementById('adBtn');

        adButton.addEventListener('click', () => {
            // تشغيل دالة الإعلان بمكافأة التابعة لـ Monetag
            // تأكد أن الرقم 11326679 هو نفس الرقم الظاهر في الكود عندك بالصورة
            show_11326679().then(() => {
                // الكود الذي يتم تنفيذه بعد مشاهدة الإعلان بنجاح
                tg.sendData("add_one_pound"); // إرسال رسالة للبوت لزيادة الرصيد
            }).catch((err) => {
                console.error("خطأ في تشغيل الإعلان أو لم يكتمل:", err);
                alert("يرجى مشاهدة الإعلان بالكامل للحصول على الجنيه!");
            });
        });
    </script>
</body>
</html>
