<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الأرباح</title>
</head>
<body style="background-color: #111; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; direction: rtl;">

    <h2>مرحباً بك في تطبيق الأرباح 🚀</h2>
    <p>اضغط على الزر بالأسفل لتشغيل الإعلان وتجميع الأرباح فوراً</p>
    
    <button id="adBtn" style="padding: 15px 30px; font-size: 18px; background-color: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold;">
        📺 تشغيل الإعلان المباشر
    </button>

    <script>
        // دالة لقط الـ Telegram ID من رابط الصفحة
        function getTelegramId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        const userId = getTelegramId() || "unknown";

        document.getElementById('adBtn').addEventListener('click', () => {
            // الرابط بتاعك مدمج وجاهز ويمرر الـ ID في خانة var1
            const myDirectLink = `https://omg10.com/4/11325608?var1=${userId}`;
            
            // تحويل المستخدم للإعلان فوراً وبسرعة صاروخية
            window.location.href = myDirectLink;
        });
    </script>

</body>
</html>
